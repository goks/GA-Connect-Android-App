name: Bump Version and Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Bump version, build APK, and publish release
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bump patch version
        id: version
        shell: python
        run: |
          import os
          from pathlib import Path
          import re

          path = Path("gradle.properties")
          lines = path.read_text().splitlines()

          props = {}
          for line in lines:
              if "=" in line and not line.lstrip().startswith("#"):
                  key, value = line.split("=", 1)
                  props[key.strip()] = value.strip()

          current_name = props.get("VERSION_NAME", "1.0.0")
          match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", current_name)
          if not match:
              raise SystemExit(f"VERSION_NAME must use major.minor.patch format, got {current_name!r}")

          major, minor, patch = map(int, match.groups())
          next_name = f"{major}.{minor}.{patch + 1}"
          next_code = int(props.get("VERSION_CODE", "0")) + 1

          def set_prop(existing_lines, key, value):
              for index, line in enumerate(existing_lines):
                  if line.startswith(f"{key}="):
                      existing_lines[index] = f"{key}={value}"
                      return
              existing_lines.append(f"{key}={value}")

          set_prop(lines, "VERSION_NAME", next_name)
          set_prop(lines, "VERSION_CODE", str(next_code))
          path.write_text("\n".join(lines) + "\n")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version_name={next_name}\n")
              output.write(f"version_code={next_code}\n")
              output.write(f"tag=v{next_name}\n")

      - name: Restore Firebase config
        shell: bash
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "Missing required secret: GOOGLE_SERVICES_JSON"
            echo "Add the contents of app/google-services.json as a GitHub Actions repository secret."
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Restore release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: $secret_name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release-key.jks"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release-key.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename release APK
        shell: bash
        run: cp app/build/outputs/apk/release/app-release.apk "GA-Connect-${{ steps.version.outputs.version_name }}.apk"

      - name: Commit version bump and tag
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: release v${{ steps.version.outputs.version_name }} [skip ci]"
          COMMIT_SHA="$(git rev-parse HEAD)"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
          git push origin "${{ steps.version.outputs.tag }}"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ steps.commit.outputs.commit_sha }}
          name: GA Connect ${{ steps.version.outputs.tag }}
          files: GA-Connect-${{ steps.version.outputs.version_name }}.apk
          generate_release_notes: true
